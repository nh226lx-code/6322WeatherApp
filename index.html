<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp - 查询天气</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>WeatherApp - 查询天气</h1>

        <div id="weather-info">
            <!-- 展示天气数据 -->
        </div>

        <div>
            <h2>查询/添加城市天气</h2>
            <input type="text" id="city-name" placeholder="输入城市名">
            <button id="add-city">查询城市</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
