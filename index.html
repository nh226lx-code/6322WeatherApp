<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <h1 class="app-logo">
                <i class="fas fa-cloud-sun"></i>
                <span>WeatherPro</span>
            </h1>
        </div>
    </header>

    <main class="app-main">
        <div class="container">
            <section class="search-module">
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="输入查询的城市">
                    <!-- 查询按钮：无文本，仅图标 -->
                    <button id="searchBtn" title="查询天气"><i class="fas fa-search"></i></button>
                </div>
            </section>

            <section class="weather-card" id="weatherCard">
                <div class="empty-state">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>请输入城市查询天气</p>
                </div>
            </section>

            <section class="collection-card">
                <div class="collection-header">
                    <h2>我的收藏</h2>
                    <span class="count" id="collectionCount">0</span>
                </div>
                <div class="collection-list" id="collectionList">
                    <div class="empty-fav">
                        <i class="fas fa-star"></i>
                        <p>暂无收藏</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="app-footer">
        <div class="footer-container">
            <p>© 2026 WeatherPro 专业天气查询 | 所有数据仅供参考</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
